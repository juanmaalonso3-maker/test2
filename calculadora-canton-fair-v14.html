function calcEnvioML(pvpCIVA, pesoReal, pesoVol, envioGratis=false) {
  const pesoMax = Math.max(pesoReal || 0, pesoVol || 0);
  if (pvpCIVA < 33000) {
    if (envioGratis) {
      // Seller offers free shipping on item < $33k — uses gratis table
      const pesoForTable = Math.min(pesoMax <= 0 ? 0.3 : pesoMax, 20);
      const row = ML_ENVIO_GRATIS.find(r => pesoForTable <= r.max) || ML_ENVIO_GRATIS[ML_ENVIO_GRATIS.length - 1];
      return { j: 0, k: row.c, envioGratisActivo: true };
    }
    const idx = pvpCIVA < 16000 ? 0 : pvpCIVA < 24000 ? 1 : 2;
    const row = ML_ENVIO_CHICO.find(r => pesoMax <= r.max) || ML_ENVIO_CHICO[ML_ENVIO_CHICO.length - 1];
    return { j: row.c[idx], k: 0, envioGratisActivo: false };
  } else {
    const idx = pvpCIVA < 50000 ? 0 : 1;
    const pesoForTable = Math.min(pesoMax, 20);
    const row = ML_ENVIO_GRANDE.find(r => pesoForTable <= r.max) || ML_ENVIO_GRANDE[ML_ENVIO_GRANDE.length - 1];
    return { j: 0, k: row.c[idx], envioGratisActivo: false };
  }
}

/* ── BREAKEVEN ─────────────────────────────────────────── */
function calcBreakevens(costoUnitARS, pesoReal, pesoVol, costosFijosMLpct, cuotaRealPct=0, impDebCredPct=1.2) {
  if (!costoUnitARS || costoUnitARS <= 0) return null;
  const cfRate = (costosFijosMLpct || 24.5) / 100;
  const cuotaRate = (cuotaRealPct || 0) / 100;
  const dcRate = (impDebCredPct || 0) / 100;
  const pesoMax = Math.max(pesoReal || 0, pesoVol || 0);
  const pesoForTable = Math.min(pesoMax <= 0 ? 0.3 : pesoMax, 20);
  const rowChico = ML_ENVIO_CHICO.find(r => pesoForTable <= r.max) || ML_ENVIO_CHICO[ML_ENVIO_CHICO.length - 1];
  const subBrackets = [
    { idx: 2, min: 24000, max: 32999 },
    { idx: 1, min: 16000, max: 23999 },
    { idx: 0, min: 0,     max: 15999 },
  ];
  // breakeven: pvpSIVA - cf - j - cuotaCost - impDC - costo = 0
  // pvpCIVA * ((1-cfRate)/1.21 - cuotaRate - dcRate) = j + costo
  const denomBase = (1 - cfRate) / 1.21 - cuotaRate - dcRate;
  let be_bajo33 = null;
  if (denomBase > 0) {
    for (const sb of subBrackets) {
      const j = rowChico.c[sb.idx];
      const pvpCIVA_be = (j + costoUnitARS) / denomBase;
      if (pvpCIVA_be >= sb.min && pvpCIVA_be <= sb.max) {
        be_bajo33 = pvpCIVA_be;
        break;
      }
    }
  }
  const rowLarge = ML_ENVIO_GRANDE.find(r => pesoForTable <= r.max) || ML_ENVIO_GRANDE[ML_ENVIO_GRANDE.length - 1];
  const largeBrackets = [
    { idx: 0, min: 33000, max: 49999 },
    { idx: 1, min: 50000, max: Infinity },
  ];
  let be_sobre33 = null;
  if (denomBase > 0) {
    for (const lb of largeBrackets) {
      const k = rowLarge.c[lb.idx];
      const pvpCIVA_be = (k + costoUnitARS) / denomBase;
      if (pvpCIVA_be >= lb.min && (pvpCIVA_be <= lb.max || lb.max === Infinity)) {
        be_sobre33 = pvpCIVA_be;
        break;
      }
    }
    if (be_sobre33 === null) {
      const k = rowLarge.c[1];
      be_sobre33 = Math.max(50000, (k + costoUnitARS) / denomBase);
    }
  }
  return { be_bajo33, be_sobre33 };
}

/* ── ML ALL BRACKETS ───────────────────────────────────── */
function calcMLAllBrackets(costoSIVA, pesoReal, pesoVol, costosFijosMLpct, cuotaRealPct=0, me1Price=0, envioGratis=false, impDebCredPct=1.2) {
  if (!costoSIVA || costoSIVA <= 0) return [];
  const cfPct = costosFijosMLpct || 24.5;
  const dcRate = (impDebCredPct || 0) / 100;
  const useME1 = me1Price > 0;
  const points = [
    { pvpCIVA: 15999,  label: '< $16.000',              buyerShipping: true  },
    { pvpCIVA: 23999,  label: '$16.000 – $23.999',      buyerShipping: true  },
    { pvpCIVA: 32999,  label: '$24.000 – $32.999',      buyerShipping: true  },
    { pvpCIVA: 49999,  label: '$33.000 – $49.999',      buyerShipping: false },
    { pvpCIVA: 60000,  label: '≥ $50.000 (ej. $60k)',   buyerShipping: false },
    { pvpCIVA: 80000,  label: '≥ $50.000 (ej. $80k)',   buyerShipping: false },
    { pvpCIVA: 100000, label: '≥ $50.000 (ej. $100k)',  buyerShipping: false },
  ];
  return points.map(({ pvpCIVA, label, buyerShipping }) => {
    const pvpSIVA = pvpCIVA / 1.21;
    const envRes = useME1
      ? { j: 0, k: me1Price, envioGratisActivo: false }
      : calcEnvioML(pvpCIVA, pesoReal, pesoVol, buyerShipping && envioGratis);
    const { j, k, envioGratisActivo } = envRes;
    const bShip = useME1 ? false : (envioGratisActivo ? false : buyerShipping);
    const cf = pvpSIVA * (cfPct / 100);
    const cuotaCost = pvpCIVA * (cuotaRealPct / 100);
    const impDC = pvpCIVA * dcRate;
    const ganancia = pvpSIVA - k - cf - j - cuotaCost - impDC - costoSIVA;
    const margen = pvpSIVA > 0 ? ganancia / pvpSIVA : -Infinity;
    return { pvpCIVA, pvpSIVA, label, j, k, cf, ganancia, margen, buyerShipping: bShip, envioGratisActivo, impDC };
  });
}

/* ── COTIZADOR INVERSO ─────────────────────────────────── */
function calcFOBInverso(p, cantidadVal, tipoEmbarqueVal, cbmVal, pesoCargaTotalVal,
                        pvpCIVA, targetMarginPct, pesoRealKg, pesoVolKg, cuotaRealPct, mlCFpct) {
  const tc = pv(p.tipoCambio, 1190);
  const cantidad = Math.max(1, pv(cantidadVal) || 1);
  const subfPct = pv(p.subfacturarPct, 0);
  const subfFactor = 1 - subfPct / 100;
  const arancel = (pv(p.diePct) + pv(p.tePct)) / 100;

  let G = 0, fleteUSD = 0, bunkerPorUnidad = 0;
  const seguro = pv(p.seguroFlat) / cantidad;

  if (tipoEmbarqueVal === 'FCL') {
    bunkerPorUnidad = pv(p.bunkerFAFBAF) / cantidad;
    fleteUSD = pv(p.fleteFCL) / cantidad;
    G = (pv(p.terminalPortuariaFCL) + pv(p.honorariosFCL) + pv(p.transporteNacFCL) +
         pv(p.manejoDocFCL) + pv(p.thcFCL) + pv(p.tollFCL) + pv(p.handlingFCL) + pv(p.docFeeFCL)) / cantidad;
  } else {
    const cbm = pv(cbmVal);
    const pesoCargaTotal = pv(pesoCargaTotalVal);
    fleteUSD = pv(p.costoCBM) * cbm / cantidad;
    G = (pv(p.manejoDocLCL) + pv(p.agpLCL) * (pesoCargaTotal / 1000) +
         pv(p.desconsolidacionLCL) + pv(p.simLCL) + pv(p.logFeeLCL) +
         (pv(p.depositoFiscalLCL) + (!p.verificacionIncluidaLCL ? pv(p.costoVerificacionLCL) : 0)) +
         pv(p.honorariosLCL) + pv(p.transporteNacLCL)) / cantidad;
  }

  // costoSinFisc (ARS/unit) = FOB * A + B  →  linear in FOB
  const F = fleteUSD + seguro + bunkerPorUnidad;
  const A = tc * (1 + subfFactor * arancel);
  const B = tc * (F * (1 + arancel) + G);

  const pvpSIVA = pvpCIVA / 1.21;
  const { j, k } = calcEnvioML(pvpCIVA, pesoRealKg, pesoVolKg);
  const envioChico = pvpCIVA < 33000;
  const cf = pvpSIVA * (mlCFpct / 100);
  const cuotaCost = pvpCIVA * cuotaRealPct / 100;
  const impDC = pvpCIVA * 0.012;
  const envio = envioChico ? j : k;
  const ingreso_neto = pvpSIVA - cf - envio - cuotaCost - impDC;

  const costoTarget  = ingreso_neto * (1 - targetMarginPct / 100);
  const fob_objetivo  = A > 0 ? (costoTarget  - B) / A : null;
  const fob_breakeven = A > 0 ? (ingreso_neto - B) / A : null;

  return { pvpCIVA, pvpSIVA, cf, envio, envioChico, cuotaCost, impDC, ingreso_neto, A, B,
           fob_objetivo, fob_breakeven, targetMarginPct,
           ganancia_objetivo: ingreso_neto * targetMarginPct / 100 };
}

/* ── HELPERS ───────────────────────────────────────────── */
const pv = (x, def=0) => { const n=parseFloat(x); return isNaN(n)?def:n; };
const ars = n => '$ ' + Math.round(n||0).toLocaleString('es-AR');
const usd = n => 'USD ' + (n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt2 = n => (n||0).toLocaleString('es-AR',{minimumFractionDigits:1,maximumFractionDigits:2});
const pct  = n => n == null ? '—' : ((n||0)*100).toLocaleString('es-AR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
const kg   = n => n == null ? '—' : (n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:3})+' kg';

/* ── CALCULATE ─────────────────────────────────────────── */
function calculate(p, d) {
  const tc       = pv(p.tipoCambio, 1190);
  const cantidad = pv(d.cantidad) || 1;

  const precioUnitFOBReal = d.tipoPrecio === 'EXW'
    ? pv(d.precioUnit) + pv(p.gastosEXW)/cantidad
    : pv(d.precioUnit);
  const subfPct           = pv(p.subfacturarPct, 0);
  const precioUnitFOBDecl = precioUnitFOBReal * (1 - subfPct/100);
  const subfacturadoUnit  = precioUnitFOBReal - precioUnitFOBDecl;

  const seguro = pv(p.seguroFlat) / cantidad;
  let fleteUSD = 0;
  let gastosAdicionalesUSD = 0;
  let detalleGastos = {};
  let bunkerPorUnidad = 0;

  if (d.tipoEmbarque === 'FCL') {
    const term     = pv(p.terminalPortuariaFCL) / cantidad;
    const hon      = pv(p.honorariosFCL) / cantidad;
    const tran     = pv(p.transporteNacFCL) / cantidad;
    bunkerPorUnidad      = pv(p.bunkerFAFBAF) / cantidad;
    const manejoFCL   = pv(p.manejoDocFCL) / cantidad;
    const thc      = pv(p.thcFCL) / cantidad;
    const toll     = pv(p.tollFCL) / cantidad;
    const handling = pv(p.handlingFCL) / cantidad;
    const docFee   = pv(p.docFeeFCL) / cantidad;
    fleteUSD = pv(p.fleteFCL) / cantidad;
    detalleGastos = {
      'Terminal Portuaria': term,
      'Manejo de Documentación': manejoFCL,
      'THC': thc,
      'TOLL': toll,
      'HANDLING': handling,
      'DOC FEE': docFee,
      'Honorarios despachante': hon,
      'Transporte nacional': tran,
    };
    gastosAdicionalesUSD = term + manejoFCL + thc + toll + handling + docFee + hon + tran;
  } else {
    const cbm            = pv(d.cbm);
    const pesoCargaTotal = pv(d.pesoCargaTotal);
    const manejo   = pv(p.manejoDocLCL) / cantidad;
    const agp      = pv(p.agpLCL) * (pesoCargaTotal/1000) / cantidad;
    const descon   = pv(p.desconsolidacionLCL) / cantidad;
    const sim      = pv(p.simLCL) / cantidad;
    const log      = pv(p.logFeeLCL) / cantidad;
    const depoBase = pv(p.depositoFiscalLCL) + (!p.verificacionIncluidaLCL ? pv(p.costoVerificacionLCL) : 0);
    const depo     = depoBase / cantidad;
    const hon      = pv(p.honorariosLCL) / cantidad;
    const tran     = pv(p.transporteNacLCL) / cantidad;
    fleteUSD = pv(p.costoCBM) * cbm / cantidad;
    detalleGastos = {
      'Manejo de doc.': manejo,
      'AGP': agp,
      'Desconsolidación': descon,
      'SIM': sim,
      'Log fee': log,
      'Depósito fiscal': depo,
      'Honorarios despachante': hon,
      'Transporte nacional': tran,
    };
    gastosAdicionalesUSD = manejo + agp + descon + sim + log + depo + hon + tran;
  }
  const ivaGastos = gastosAdicionalesUSD * 0.21;

  const costoEXWunit    = precioUnitFOBReal + bunkerPorUnidad;
  const cifUSD          = costoEXWunit + fleteUSD + seguro;
  const costoEXWDecl    = precioUnitFOBDecl + bunkerPorUnidad;
  const cifDeclaradoUSD = costoEXWDecl + fleteUSD + seguro;
  const baseArancel     = cifDeclaradoUSD * tc;
  const die             = baseArancel * pv(p.diePct) / 100;
  const te              = baseArancel * pv(p.tePct) / 100;
  const baseIVA         = cifDeclaradoUSD * tc + die + te;
  const ivaImport       = baseIVA * pv(p.ivaImportPct) / 100;
  const ivaAdicional    = baseIVA * pv(p.ivaAdicionalPct) / 100;
  const percIIGG        = baseIVA * pv(p.percIIGGpct) / 100;
  const percIIBB        = baseIVA * pv(p.percIIBBpct) / 100;
  const totalAranceles  = die + te;
  const totalCredFisc   = ivaImport + ivaAdicional + percIIGG + percIIBB + ivaGastos * tc;
  const costoSinFisc    = (cifUSD + gastosAdicionalesUSD) * tc + totalAranceles;
  const costoTotalARS   = costoSinFisc + totalCredFisc;
  const costoSinFiscUSD = costoSinFisc / tc;
  const costoUnitUSD    = costoTotalARS / tc;

  return {
    precioUnitFOBReal, precioUnitFOBDecl, subfacturadoUnit, subfPct,
    bunkerPorUnidad, costoEXWunit,
    fleteUSD, seguro, cifUSD, cifDeclaradoUSD,
    gastosAdicionalesUSD, ivaGastos, detalleGastos,
    die, te, totalAranceles, baseIVA,
    ivaImport, ivaAdicional, percIIGG, percIIBB, totalCredFisc,
    costoTotalARS, costoSinFisc, costoUnitUSD, costoSinFiscUSD,
  };
}

const App = () => {
  /* params */
  const [p, setP] = useState(() => {
    try { const s=localStorage.getItem(PARAMS_KEY); return s?{...DEFAULT_PARAMS,...JSON.parse(s)}:DEFAULT_PARAMS; }
    catch { return DEFAULT_PARAMS; }
  });
  const upP = (k,v) => setP(prev => ({...prev,[k]: v===''?'':(isNaN(parseFloat(v))?prev[k]:parseFloat(v))}));
  const upPBool = (k,v) => setP(prev => ({...prev,[k]:!!v}));
  useEffect(() => { try{localStorage.setItem(PARAMS_KEY,JSON.stringify(p));}catch{} },[p]);

  /* cotizaciones */
  const [cotizaciones, setCotizaciones] = useState(() => {
    try{const s=localStorage.getItem(COTIZ_KEY);return s?JSON.parse(s):[];}catch{return [];}
  });
  const saveCotiz = useCallback((nombre, data) => {
    const arr=[{id:Date.now(),nombre,fecha:new Date().toLocaleDateString('es-AR'),...data},...cotizaciones];
    setCotizaciones(arr);
    try{localStorage.setItem(COTIZ_KEY,JSON.stringify(arr));}catch{}
  },[cotizaciones]);
  const deleteCotiz = useCallback(id => {
    const arr=cotizaciones.filter(c=>c.id!==id);
    setCotizaciones(arr);
    try{localStorage.setItem(COTIZ_KEY,JSON.stringify(arr));}catch{}
  },[cotizaciones]);

  /* tabs */
  const [tab, setTab] = useState('importacion');

  /* producto inputs */
  const [precioUnit,     setPrecioUnit]     = useState('');
  const [cantidad,       setCantidad]       = useState('');
  const [tipoPrecio,     setTipoPrecio]     = useState('FOB');
  const [tipoEmbarque,   setTipoEmbarque]   = useState('FCL');
  const [cbm,            setCbm]            = useState('');
  const [pesoCargaTotal, setPesoCargaTotal] = useState('');
  const [precioVenta,    setPrecioVenta]    = useState('');
  const [largo,          setLargo]          = useState('');
  const [ancho,          setAncho]          = useState('');
  const [alto,           setAlto]           = useState('');
  const [pesoReal,       setPesoReal]       = useState('');

  /* Producto cuotas */
  const [prodCuotas, setProdCuotas] = useState(0);

  /* ML cuotas */
  const [meliCuotas, setMeliCuotas] = useState(0);

  /* ML independiente */
  const [meliCosto,       setMeliCosto]       = useState('');
  const [meliPrecioVenta, setMeliPrecioVenta] = useState('');
  const [meliPesoReal,    setMeliPesoReal]    = useState('');
  const [meliLargo,       setMeliLargo]       = useState('');
  const [meliAncho,       setMeliAncho]       = useState('');
  const [meliAlto,        setMeliAlto]        = useState('');

  /* ME1 — Envío especial fuera de cálculo ML */
  const [prodME1,       setProdME1]       = useState(false);
  const [prodPrecioME1, setProdPrecioME1] = useState('');
  const [prodEnvioGratis, setProdEnvioGratis] = useState(false);
  const [meliME1,       setMeliME1]       = useState(false);
  const [meliPrecioME1, setMeliPrecioME1] = useState('');
  const [meliEnvioGratis, setMeliEnvioGratis] = useState(false);

  /* MeLi Inverso */
  const [invPVP,       setInvPVP]       = useState('');
  const [invMargen,    setInvMargen]     = useState('');
  const [invCantidad,  setInvCantidad]   = useState('');
  const [invCuotas,    setInvCuotas]     = useState(0);
  const [invLargo,     setInvLargo]      = useState('');
  const [invAncho,     setInvAncho]      = useState('');
  const [invAlto,      setInvAlto]       = useState('');
  const [invPesoReal,  setInvPesoReal]   = useState('');

  /* misc */
  const [showSave,    setShowSave]    = useState(false);
  const [searchQ,     setSearchQ]     = useState('');
  const [expandCotiz, setExpandCotiz] = useState(null);

  const reset = () => {
    setPrecioUnit(''); setCantidad(''); setCbm(''); setPesoCargaTotal('');

  };

  /* computed */
  const mlCFpct = useMemo(() =>
    pv(p.mlComisionPct,14.5)+pv(p.mlPublicidadPct,3)+pv(p.mlIIBBpct,5)+pv(p.mlVariosPct,2),
    [p.mlComisionPct,p.mlPublicidadPct,p.mlIIBBpct,p.mlVariosPct]);

  const cuotaRealPct   = meliCuotas>0 ? pv(p[`cuotas${meliCuotas}CostoReal`]) : 0;
  const cuotaMarkupPct = pv(p.cuotasTrasladoAdicional);

  const prodCuotaRealPct = prodCuotas>0 ? pv(p[`cuotas${prodCuotas}CostoReal`]) : 0;

  const pesoVolCalc = useMemo(() => {
    const l=pv(largo),a=pv(ancho),al=pv(alto);
    return (l&&a&&al) ? l*a*al/4000 : 0;
  },[largo,ancho,alto]);

  const r = useMemo(() => {
    if (!precioUnit||!cantidad) return null;
    return calculate(p,{precioUnit,cantidad,tipoPrecio,tipoEmbarque,cbm,pesoCargaTotal,precioVenta,largo,ancho,alto,pesoReal});
  },[p,precioUnit,cantidad,tipoPrecio,tipoEmbarque,cbm,pesoCargaTotal,precioVenta,largo,ancho,alto,pesoReal]);

  const meliPesoVol = useMemo(() => {
    const l=pv(meliLargo), a=pv(meliAncho), h=pv(meliAlto);
    return (l&&a&&h) ? l*a*h/4000 : 0;
  }, [meliLargo, meliAncho, meliAlto]);

  const meliOptRec = useMemo(() => {
    const c = pv(meliCosto);
    const dcRate = pv(p.mlImpDebCredPct) / 100;
    if (!c) return null;
    if (meliME1 && pv(meliPrecioME1) > 0) {
      const cfRate = mlCFpct / 100;
      const cuotaRate = cuotaRealPct / 100;
      const denom = (1 - cfRate) / 1.21 - cuotaRate - dcRate;
      const be = denom > 0 ? (pv(meliPrecioME1) + c) / denom : Infinity;
      return { be_bajo33: null, be_sobre33: be, isME1: true };
    }
    return calcBreakevens(c, pv(meliPesoReal), meliPesoVol, mlCFpct, cuotaRealPct, pv(p.mlImpDebCredPct));
  }, [meliCosto, meliPesoReal, meliPesoVol, mlCFpct, meliME1, meliPrecioME1, cuotaRealPct, p.mlImpDebCredPct]);

  const meliResultadoPrecio = useMemo(() => {
    const costo   = pv(meliCosto);
    const pvpCIVA = pv(meliPrecioVenta);
    if (!costo || !pvpCIVA) return null;
    const pvpSIVA = pvpCIVA / 1.21;
    const envRes = (meliME1 && pv(meliPrecioME1) > 0)
      ? { j: 0, k: pv(meliPrecioME1), envioGratisActivo: false }
      : calcEnvioML(pvpCIVA, pv(meliPesoReal), meliPesoVol, meliEnvioGratis);
    const { j, k, envioGratisActivo } = envRes;
    const cfRate  = mlCFpct / 100;
    const cf      = pvpSIVA * cfRate;
    const cuotaCost = pvpCIVA * cuotaRealPct / 100;
    const impDC = pvpCIVA * pv(p.mlImpDebCredPct) / 100;
    const ganancia = pvpSIVA - k - cf - j - cuotaCost - impDC - costo;
    const margen   = pvpSIVA > 0 ? ganancia / pvpSIVA : 0;
    const buyerShipping = meliME1 ? false : (envioGratisActivo ? false : pvpCIVA < 33000);
    return { pvpCIVA, pvpSIVA, j, k, cf, ganancia, margen, buyerShipping, envioGratisActivo, impDC };
  }, [meliCosto, meliPrecioVenta, meliPesoReal, meliPesoVol, mlCFpct, cuotaRealPct, meliME1, meliPrecioME1, meliEnvioGratis, p.mlImpDebCredPct]);

  const meliBrackets = useMemo(() => {
    const c = pv(meliCosto);
    if (!c) return [];
    const me1p = meliME1 ? pv(meliPrecioME1) : 0;
    return calcMLAllBrackets(c, pv(meliPesoReal), meliPesoVol, mlCFpct, cuotaRealPct, me1p, meliEnvioGratis, pv(p.mlImpDebCredPct));
  }, [meliCosto, meliPesoReal, meliPesoVol, mlCFpct, cuotaRealPct, meliME1, meliPrecioME1, meliEnvioGratis, p.mlImpDebCredPct]);

  const invPesoVol = useMemo(() => {
    const l=pv(invLargo), a=pv(invAncho), h=pv(invAlto);
    return (l&&a&&h) ? l*a*h/4000 : 0;
  }, [invLargo, invAncho, invAlto]);

  const invCuotaRealPct = invCuotas > 0 ? pv(p[`cuotas${invCuotas}CostoReal`]) : 0;

  // invCantidad tiene prioridad; si está vacío usa la cantidad del tab Producto
  const invCantidadEfectiva = pv(invCantidad) || pv(cantidad) || 0;

  const invResult = useMemo(() => {
    const pvpCIVA = pv(invPVP);
    if (!pvpCIVA || invCantidadEfectiva <= 0) return null;
    return calcFOBInverso(p, invCantidadEfectiva, tipoEmbarque, cbm, pesoCargaTotal,
      pvpCIVA, pv(invMargen, 0), pv(invPesoReal), invPesoVol, invCuotaRealPct, mlCFpct);
  }, [p, invCantidadEfectiva, tipoEmbarque, cbm, pesoCargaTotal,
      invPVP, invMargen, invPesoReal, invPesoVol, invCuotaRealPct, mlCFpct]);

  const bracketColor = m =>
    m > 0.25  ? 'bg-green-50 text-green-700 font-bold' :
    m > 0.12  ? 'bg-amber-50 text-amber-700 font-semibold' :
    m > 0     ? 'bg-slate-50 text-slate-600' :
                'bg-red-50 text-red-500';

  /* ────────────────────────────────────────────────────── */
  return (
    <div className="min-h-screen bg-slate-100 flex flex-col">

      {/* HEADER */}
      <div className="bg-gradient-to-r from-indigo-700 to-indigo-600 text-white px-4 py-4 shadow-lg">
        <div className="max-w-5xl mx-auto flex justify-between items-center gap-3">
          <div>
            <h1 className="text-xl font-bold tracking-tight">🧮 Calculadora de Importación</h1>
            <p className="text-indigo-200 text-xs mt-0.5">Canton Fair · Argentina · v14</p>
          </div>
          <div className="flex gap-2 shrink-0">
            {r && (
              <button onClick={() => setShowSave(true)}
                className="bg-white/15 hover:bg-white/25 text-white text-xs font-medium px-3 py-2 rounded-lg transition-all flex items-center gap-1.5 border border-white/20">
                💾 Guardar
              </button>
            )}
            <button onClick={() => { reset(); setTab('importacion'); }}
              className="bg-white text-indigo-700 text-xs font-semibold px-3 py-2 rounded-lg transition-all hover:bg-indigo-50 flex items-center gap-1.5 shadow-sm">
              ✨ Nueva
            </button>
          </div>
        </div>
      </div>

      {/* TABS */}
      <div className="bg-white border-b border-slate-200 shadow-sm">
        <div className="max-w-5xl mx-auto px-4 flex overflow-x-auto">
          {[
            ['importacion', '📋 Importación'],
            ['producto',     '📦 Producto'],
            ['ml',           '🛒 Cotizador ML'],
            ['cotizaciones', '📚 Cotizaciones'],
            ['params',       '⚙️ Parámetros'],

            <button key={id} onClick={() => setTab(id)}

              }`}>
              {label}
              {id==='cotizaciones' && cotizaciones.length>0 && (
                <span className="ml-1.5 bg-indigo-100 text-indigo-600 text-xs px-1.5 py-0.5 rounded-full font-semibold">
                  {cotizaciones.length}
                </span>
              )}
            </button>
          ))}
        </div>

      {/* ══ PRODUCTO TAB ══ */}

            {/* Inputs izquierda */}

                  <div className="fade-in bg-indigo-50 rounded-lg px-3 py-2 mb-3">
                    <p className="text-xs text-indigo-600">

                    </p>
                  </div>
                )}

                <Toggle label="Tipo de embarque" value={tipoEmbarque} onChange={setTipoEmbarque}

                <Field label="Subfacturación" value={p.subfacturarPct} onChange={v=>upP('subfacturarPct',v)} suf="%"/>

              <div className="bg-white rounded-xl border border-slate-100 shadow-sm p-4">

                <div className="grid grid-cols-3 gap-2 mb-2">
                  <Field small label="Largo" value={largo} onChange={setLargo} suf="cm"/>
                  <Field small label="Ancho" value={ancho} onChange={setAncho} suf="cm"/>
                  <Field small label="Alto"  value={alto}  onChange={setAlto}  suf="cm"/>

                <Field label="Peso real del producto" value={pesoReal} onChange={setPesoReal} suf="kg"/>
                {(pesoVolCalc>0 || pv(pesoReal)>0) && (

                <div className="mt-3 pt-3 border-t border-slate-100">
                  <label className="flex items-center gap-2 cursor-pointer select-none mb-2">
                    <input type="checkbox" checked={prodEnvioGratis} onChange={e=>{setProdEnvioGratis(e.target.checked); if(e.target.checked) setProdME1(false);}}
                      className="w-4 h-4 rounded accent-green-500 cursor-pointer"/>
                    <span className="text-sm font-medium text-slate-700">🚚 Ofrecer envío gratis (PVP &lt; $33.000)</span>

                  {prodEnvioGratis && (

                      <p className="text-xs text-green-700">El vendedor absorbe el costo de envío aunque el PVP sea menor a $33.000. Se aplica la tarifa de envío gratis de ML.</p>
                    </div>

                  <label className="flex items-center gap-2 cursor-pointer select-none mb-2">
                    <input type="checkbox" checked={prodME1} onChange={e=>{setProdME1(e.target.checked); if(e.target.checked) setProdEnvioGratis(false);}}
                      className="w-4 h-4 rounded accent-orange-500 cursor-pointer"/>
                    <span className="text-sm font-medium text-slate-700">📦 Envío ME1 (fuera de cálculo ML)</span>
                  </label>
                  {prodME1 && (
                    <div className="fade-in">
                      <Field label="Precio de envío ME1 por unidad" value={prodPrecioME1}

              </div>

              <div className="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
                <h2 className="font-semibold text-slate-800 mb-3">🛒 Precio de venta</h2>
                <Field label="Precio de venta en MercadoLibre (con IVA)" value={precioVenta} onChange={setPrecioVenta} pre="ARS"/>

                {/* Cuotas selector */}
                <div className="mb-3">
                  <label className="block text-xs font-medium text-slate-500 mb-1">💳 Modalidad de pago</label>
                  <div className="flex bg-slate-100 rounded-lg p-1 gap-1 flex-wrap">
                    {[0,3,6,9,12].map(c => (
                      <button key={c} onClick={() => setProdCuotas(c)}
                        className={`flex-1 py-1.5 px-2 text-sm font-medium rounded-md transition-all min-w-max ${
                          prodCuotas===c ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                        }`}>
                        {c===0 ? 'Contado' : `${c} cuotas`}
                      </button>
                    ))}
                  </div>
                  {prodCuotas>0 && (
                    <div className="mt-2 bg-indigo-50 rounded-lg px-3 py-2 text-xs text-indigo-700 fade-in">

                    </div>

                <div className="bg-slate-50 rounded-lg px-3 py-2.5 space-y-1">
                  <div className="text-xs font-medium text-slate-400 uppercase mb-1">Parámetros activos</div>
                  <div className="flex justify-between text-xs"><span className="text-slate-400">Tipo de cambio</span><span className="text-slate-600 font-medium">$ {(pv(p.tipoCambio)||0).toLocaleString('es-AR')}</span></div>
                  {tipoEmbarque === 'FCL' ? (
                    <>
                      <div className="flex justify-between text-xs"><span className="text-slate-400">Flete container (CIF)</span><span className="text-slate-600 font-medium">{usd(pv(p.fleteFCL))}</span></div>
                      <div className="flex justify-between text-xs"><span className="text-slate-400">Terminal + desp. + transp.</span><span className="text-slate-600 font-medium">{usd(pv(p.terminalPortuariaFCL)+pv(p.honorariosFCL)+pv(p.transporteNacFCL))}</span></div>
                    </>
                  ) : (
                    <>
                      <div className="flex justify-between text-xs"><span className="text-slate-400">Costo por CBM (CIF)</span><span className="text-slate-600 font-medium">{usd(pv(p.costoCBM))}/CBM</span></div>
                      <div className="flex justify-between text-xs"><span className="text-slate-400">Gastos Arg. (neto s/IVA)</span><span className="text-slate-600 font-medium">{r ? usd(r.gastosAdicionalesUSD * (pv(cantidad)||1)) : '—'}</span></div>

                  const margenCosto = r.costoSinFisc > 0 ? gananciaML / r.costoSinFisc : 0;

                        <div>CMV: {ars(r.costoSinFisc)}</div>

                {/* Breakeven ML */}

                    <div className="bg-gradient-to-br from-violet-600 to-violet-700 text-white rounded-xl p-4 shadow-md fade-in">
                      <div className="text-white/70 text-xs font-medium uppercase tracking-widest mb-3">⚖️ Punto de equilibrio para ML (margen = 0%)</div>
                      <div className="space-y-2">
                        <div className="bg-white/10 rounded-lg px-3 py-2.5">
                          <div className="text-white/60 text-xs mb-1">PVP &lt; $33.000 · envío a cargo del cliente</div>
                          {optRec.be_bajo33 != null
                            ? <div className="text-2xl font-bold">{ars(optRec.be_bajo33)}</div>
                            : <div className="text-sm font-semibold text-red-200">No alcanzable — el costo supera el límite del tramo</div>
                          }
                        </div>
                        <div className="bg-white/10 rounded-lg px-3 py-2.5">
                          <div className="text-white/60 text-xs mb-1">PVP ≥ $33.000 · envío a cargo del vendedor</div>
                          <div className="text-2xl font-bold">{ars(optRec.be_sobre33)}</div>
                        </div>
                      </div>
                    </div>
                  );
                })()}

                {/* Desglose de importación */}
                {(() => {
                  const q  = pv(cantidad) || 1;

                      {tipoPrecio==='EXW' && <Row indent label="↳ Precio EXW total" value={usd(pv(precioUnit) * q)}/>}
                      {tipoPrecio==='EXW' && pv(p.gastosEXW) > 0 && <Row indent label="↳ Gastos hasta FOB (EXW)" value={usd(pv(p.gastosEXW))} sub={`fijo por lote ÷ ${q} uds`}/>}
                      {r.subfPct > 0 && <Row indent red label={`↳ FOB declarado a aduana (−${r.subfPct}% subfacturación)`} value={usd(r.precioUnitFOBDecl * q)} sub="Base reducida para impuestos"/>}
                      {r.bunkerPorUnidad > 0 && <Row indent label="↳ BUNKER/FAF/BAF total" value={usd(r.bunkerPorUnidad * q)}/>}
                      <Row indent label="Seguro total" value={usd(r.seguro * q)}/>
                      <Row indent label={tipoEmbarque==='FCL' ? 'Flete container (FCL)' : 'Flete LCL'} value={usd(r.fleteUSD * q)}/>
                      <Row bold label={r.subfPct>0 ? 'CIF declarado (base imponible)' : 'CIF total'} value={usd((r.subfPct>0 ? r.cifDeclaradoUSD : r.cifUSD) * q)} separator/>

                      <SectionLabel>Aranceles (sobre CIF{r.subfPct>0?' declarado':''})</SectionLabel>
                      <Row indent label={`↳ DIE — arancel (${pv(p.diePct)}%)`} value={usd(r.die / tc * q)}/>
                      <Row indent label={`↳ TE — tasa estadística (${pv(p.tePct)}%)`} value={usd(r.te / tc * q)}/>
                      <Row bold label="Total aranceles" value={usd(r.totalAranceles / tc * q)} separator/>

                      <SectionLabel>Gastos en Argentina ({tipoEmbarque==='FCL'?'FCL':'LCL'})</SectionLabel>
                      {Object.entries(r.detalleGastos).map(([k,v]) =>
                        v > 0 ? <Row key={k} indent label={`↳ ${k}`} value={usd(v * q)}/> : null
                      )}
                      <Row bold label="Total gastos Argentina" value={usd(r.gastosAdicionalesUSD * q)} separator/>

                      <SectionLabel>Créditos fiscales (recuperables)</SectionLabel>
                      <Row gray indent label={`↳ IVA importación (${pv(p.ivaImportPct)}%)`} value={usd(r.ivaImport / tc * q)}/>
                      <Row gray indent label={`↳ IVA adicional (${pv(p.ivaAdicionalPct)}%)`} value={usd(r.ivaAdicional / tc * q)}/>
                      <Row gray indent label={`↳ Percep. a cta. IIGG (${pv(p.percIIGGpct)}%)`} value={usd(r.percIIGG / tc * q)}/>
                      <Row gray indent label={`↳ Percep. a cta. IIBB (${pv(p.percIIBBpct)}%)`} value={usd(r.percIIBB / tc * q)}/>
                      {r.ivaGastos > 0 && <Row gray indent label="↳ IVA gastos Argentina (21%)" value={usd(r.ivaGastos * q)}/>}
                      <Row bold label="Total créditos fiscales" value={usd(r.totalCredFisc / tc * q)} separator/>
                      <p className="text-xs text-slate-400 mt-1 mb-2">* Se recuperan vía compensación fiscal — no son costo real.</p>

                      <CostoFinalRow
                        labelUSD="💵 Costo final x unidad (USD, sin créd. fisc.)"

                        valARS={r.costoSinFisc}

                })()}

                {/* Desglose MercadoLibre — siempre visible */}

                  const pvpCIVA = pv(precioVenta) || 0;
                  const pvpSIVA = pvpCIVA / 1.21;
                  const tieneVenta = pvpCIVA > 0;
                  const envRes = tieneVenta
                    ? ((prodME1 && pv(prodPrecioME1) > 0)
                      ? { j: 0, k: pv(prodPrecioME1), envioGratisActivo: false }
                      : calcEnvioML(pvpCIVA, pv(pesoReal), pesoVolCalc, prodEnvioGratis))
                    : { j: 0, k: 0, envioGratisActivo: false };
                  const { j, k, envioGratisActivo } = envRes;
                  const comision   = pvpSIVA * pv(p.mlComisionPct)  / 100;
                  const publicidad = pvpSIVA * pv(p.mlPublicidadPct) / 100;
                  const iibbML     = pvpSIVA * pv(p.mlIIBBpct)       / 100;
                  const variosML   = pvpSIVA * pv(p.mlVariosPct)      / 100;
                  const cf         = comision + publicidad + iibbML + variosML;
                  const envioChico = (prodME1 && pv(prodPrecioME1) > 0) ? false : (envioGratisActivo ? false : pvpCIVA < 33000);
                  const cuotaCost  = pvpCIVA * prodCuotaRealPct / 100;
                  const impDC      = pvpCIVA * pv(p.mlImpDebCredPct) / 100;
                  const gananciaML = tieneVenta ? pvpSIVA - (envioChico ? j : k) - cf - cuotaCost - impDC - r.costoSinFisc : null;
                  const fmtVal = (pct, ars_val) => tieneVenta ? `− ${ars(ars_val)}` : `${fmt2(pct)}%`;
                  return (
                    <Collapsible title="🛒 Desglose MercadoLibre" defaultOpen={true}>
                      {tieneVenta && (<>
                        <SectionLabel>Precio de venta</SectionLabel>
                        <Row bold label="PVP con IVA (precio publicado)" value={ars(pvpCIVA)}/>
                        <Row indent label="↳ PVP sin IVA (21%)" value={ars(pvpSIVA)}/>

                      <Row indent label={`↳ Publicidad (${pv(p.mlPublicidadPct)}%)`}  value={fmtVal(pv(p.mlPublicidadPct), publicidad)}/>
                      <Row indent label={`↳ IIBB ML (${pv(p.mlIIBBpct)}%)`}           value={fmtVal(pv(p.mlIIBBpct),       iibbML)}/>
                      <Row indent label={`↳ Varios (${pv(p.mlVariosPct)}%)`}           value={fmtVal(pv(p.mlVariosPct),     variosML)}/>
                      <Row bold label="Total comisiones fijas" value={tieneVenta ? `− ${ars(cf)}` : `${fmt2(mlCFpct)}% del PVP S/IVA`} separator/>

                        <SectionLabel>Costo de mercadería</SectionLabel>
                        <Row indent label="↳ CMV (sin créditos fiscales)" value={`− ${ars(r.costoSinFisc)}`} separator/>
                        <Row bold green label="Ganancia neta" value={ars(gananciaML)} separator/>
                      </>)}
                      {!tieneVenta && (
                        <p className="text-xs text-slate-400 italic mt-1">Ingresá el precio de venta para ver montos y ganancia.</p>

                    </Collapsible>

      {/* ══ COTIZADOR ML TAB ══ */}

            {/* Inputs */}
            <div className="space-y-4">
              <div className="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
                <h2 className="font-semibold text-slate-800 mb-1">🛒 Cotizador MercadoLibre</h2>
                <p className="text-xs text-slate-400 mb-4">Ingresá tu costo de compra S/IVA y calculamos el PVP óptimo y la rentabilidad por tramo.</p>

                {/* Selector cuotas */}
                <div className="mb-4">
                  <label className="block text-xs font-medium text-slate-500 mb-1">💳 Modalidad de pago</label>
                  <div className="flex bg-slate-100 rounded-lg p-1 gap-1 flex-wrap">
                    {[0,3,6,9,12].map(c => (
                      <button key={c} onClick={() => setMeliCuotas(c)}
                        className={`flex-1 py-1.5 px-2 text-sm font-medium rounded-md transition-all min-w-max ${
                          meliCuotas===c ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                        }`}>
                        {c===0 ? 'Contado' : `${c} cuotas`}
                      </button>
                    ))}

          <div className="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
            <h2 className="font-semibold text-slate-800 mb-3">📚 Cotizaciones guardadas</h2>
            <div className="flex rounded-lg overflow-hidden border border-slate-200 bg-white focus-within:border-indigo-400 transition-all">
              <span className="px-3 py-2 bg-slate-50 text-slate-400 text-xs border-r border-slate-200">🔍</span>
              <input type="text" placeholder="Buscar por nombre…" value={searchQ} onChange={e=>setSearchQ(e.target.value)}
                className="flex-1 px-3 py-2 text-sm outline-none text-slate-800"/>
            </div>
          </div>

          {cotizaciones.length===0 && (
            <div className="bg-white rounded-xl border border-slate-100 shadow-sm p-8 text-center text-slate-400 text-sm">
              No hay cotizaciones guardadas todavía
            </div>
          )}

          {cotizaciones
            .filter(c => !searchQ || c.nombre.toLowerCase().includes(searchQ.toLowerCase()))
            .map(c => (
              <div key={c.id} className="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
                <button onClick={() => setExpandCotiz(expandCotiz===c.id ? null : c.id)}
                  className="flex justify-between items-center w-full px-4 py-3 text-left hover:bg-slate-50 transition-colors">
                  <div className="flex items-center gap-3">
                    <div>
                      <span className="font-semibold text-slate-800 text-sm">{c.nombre}</span>
                      <div className="flex items-center gap-2 mt-0.5">
                        <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${c.tipoEmbarque==='FCL'?'bg-blue-100 text-blue-700':'bg-green-100 text-green-700'}`}>
                          {c.tipoEmbarque||'—'}
                        </span>
                        <span className="text-xs text-slate-400">{c.fecha}</span>
                      </div>
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    {c.costoSinFisc && <span className="font-bold text-indigo-700 text-sm">{ars(c.costoSinFisc)}</span>}
                    <button onClick={e=>{e.stopPropagation();deleteCotiz(c.id)}}
                      className="text-xs text-slate-300 hover:text-red-400 transition-colors px-1">🗑️</button>
                    <span className="text-slate-400 text-xs">{expandCotiz===c.id?'▲':'▼'}</span>
                  </div>
                </button>
                {expandCotiz===c.id && (
                  <div className="px-4 pb-4 fade-in border-t border-slate-100 pt-3">
                    <div className="grid grid-cols-2 gap-x-4 text-sm mb-3">
                      <Row label="Precio unit." value={usd(pv(c.precioUnit))}/>
                      <Row label="Cantidad" value={`${c.cantidad} u`}/>
                      <Row label="Tipo precio" value={c.tipoPrecio||'—'}/>
                      <Row label="Embarque" value={c.tipoEmbarque||'—'}/>
                      {c.cbm && <Row label="CBM" value={`${c.cbm} m³`}/>}
                      {c.pesoCargaTotal && <Row label="Peso carga" value={`${c.pesoCargaTotal} kg`}/>}
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-indigo-50 rounded-lg p-3">
                        <p className="text-xs text-indigo-500 font-medium">Costo unit. (sin créd.)</p>
                        <p className="text-lg font-bold text-indigo-800">{ars(c.costoSinFisc||0)}</p>
                        <p className="text-xs text-indigo-400">{usd(c.costoSinFiscUSD||0)}</p>
                      </div>
                      <div className="bg-slate-50 rounded-lg p-3">
                        <p className="text-xs text-slate-500 font-medium">Costo unit. (total)</p>
                        <p className="text-lg font-bold text-slate-800">{ars(c.costoTotalARS||0)}</p>
                        <p className="text-xs text-slate-400">{usd(c.costoUnitUSD||0)}</p>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            ))
          }
        </div>
      )}

      {/* ══ PARÁMETROS TAB ══ */}
      {tab==='params' && (
        <div className="max-w-5xl mx-auto w-full p-4">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

            {/* Columna izquierda */}
            <div className="space-y-4">
              <div className="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
                <h2 className="font-semibold text-slate-800 mb-3">🌐 General</h2>
                <Field label="Tipo de cambio" value={p.tipoCambio} onChange={v=>upP('tipoCambio',v)} pre="ARS/USD"/>
                <Field label="Subfacturación" value={p.subfacturarPct} onChange={v=>upP('subfacturarPct',v)} suf="%"/>
                <Field label="Seguro flat (total embarque)" value={p.seguroFlat} onChange={v=>upP('seguroFlat',v)} pre="USD"/>
                <Field label="Gastos EXW (flete China + aduana exp.)" value={p.gastosEXW} onChange={v=>upP('gastosEXW',v)} pre="USD"/>
              </div>

              <div className="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
                <h2 className="font-semibold text-slate-800 mb-3">🚢 FCL — Flete y Terminal</h2>
                <Field label="Flete FCL (total embarque)" value={p.fleteFCL} onChange={v=>upP('fleteFCL',v)} pre="USD"/>
                <Field label="Terminal Portuaria (+IVA 21%)" value={p.terminalPortuariaFCL} onChange={v=>upP('terminalPortuariaFCL',v)} pre="USD"/>

                <SectionLabel>Gastos en Argentina FCL</SectionLabel>
                <Field label="BUNKER/FAF/BAF (sin IVA, directo)" value={p.bunkerFAFBAF} onChange={v=>upP('bunkerFAFBAF',v)} pre="USD"/>
                <Field label="Manejo de Documentación (+IVA 21%)" value={p.manejoDocFCL} onChange={v=>upP('manejoDocFCL',v)} pre="USD"/>
                <Field label="THC (+IVA 21%)" value={p.thcFCL} onChange={v=>upP('thcFCL',v)} pre="USD"/>
                <Field label="TOLL (+IVA 21%)" value={p.tollFCL} onChange={v=>upP('tollFCL',v)} pre="USD"/>
                <Field label="HANDLING (+IVA 21%)" value={p.handlingFCL} onChange={v=>upP('handlingFCL',v)} pre="USD"/>
                <Field label="DOC FEE (+IVA 21%)" value={p.docFeeFCL} onChange={v=>upP('docFeeFCL',v)} pre="USD"/>
                <Field label="Honorarios despachante (+IVA 21%)" value={p.honorariosFCL} onChange={v=>upP('honorariosFCL',v)} pre="USD"/>
                <Field label="Transporte nacional (+IVA 21%)" value={p.transporteNacFCL} onChange={v=>upP('transporteNacFCL',v)} pre="USD"/>
              </div>

              <div className="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
                <h2 className="font-semibold text-slate-800 mb-3">📋 Aranceles de importación</h2>
                <div className="grid grid-cols-2 gap-2">
                  <Field small label="DIE %" value={p.diePct} onChange={v=>upP('diePct',v)} suf="%"/>
                  <Field small label="TE %" value={p.tePct} onChange={v=>upP('tePct',v)} suf="%"/>
                  <Field small label="IVA importación %" value={p.ivaImportPct} onChange={v=>upP('ivaImportPct',v)} suf="%"/>
                  <Field small label="IVA adicional %" value={p.ivaAdicionalPct} onChange={v=>upP('ivaAdicionalPct',v)} suf="%"/>
                  <Field small label="Percep. IIGG %" value={p.percIIGGpct} onChange={v=>upP('percIIGGpct',v)} suf="%"/>
                  <Field small label="Percep. IIBB %" value={p.percIIBBpct} onChange={v=>upP('percIIBBpct',v)} suf="%"/>
                </div>
              </div>
            </div>

            {/* Columna derecha */}
            <div className="space-y-4">
              <div className="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
                <h2 className="font-semibold text-slate-800 mb-3">📦 LCL</h2>
                <Field label="Costo por CBM" value={p.costoCBM} onChange={v=>upP('costoCBM',v)} pre="USD" suf="/m³"/>

                <SectionLabel>Gastos locales (base s/IVA, se aplica +21%)</SectionLabel>
                <Field label="Manejo de doc." value={p.manejoDocLCL} onChange={v=>upP('manejoDocLCL',v)} pre="USD"/>
                <Field label="AGP (por tonelada)" value={p.agpLCL} onChange={v=>upP('agpLCL',v)} pre="USD" suf="/ton"/>
                <Field label="Desconsolidación" value={p.desconsolidacionLCL} onChange={v=>upP('desconsolidacionLCL',v)} pre="USD"/>
                <Field label="SIM" value={p.simLCL} onChange={v=>upP('simLCL',v)} pre="USD"/>
                <Field label="Log fee" value={p.logFeeLCL} onChange={v=>upP('logFeeLCL',v)} pre="USD"/>

                <SectionLabel>Depósito fiscal y verificación</SectionLabel>
                <Field label="Depósito fiscal (+IVA 21%)" value={p.depositoFiscalLCL} onChange={v=>upP('depositoFiscalLCL',v)} pre="USD"/>

                <div className="flex items-center gap-2 mb-3">
                  <input type="checkbox" id="verif-check" checked={!p.verificacionIncluidaLCL}
                    onChange={e=>upPBool('verificacionIncluidaLCL',!e.target.checked)}
                    className="w-4 h-4 accent-indigo-600 cursor-pointer"/>
                  <label htmlFor="verif-check" className="text-xs font-medium text-slate-500 cursor-pointer">
                    Verificación NO incluida (tiene costo adicional)
                  </label>
                </div>
                {!p.verificacionIncluidaLCL && (
                  <div className="fade-in">
                    <Field label="Costo verificación (+IVA 21%)" value={p.costoVerificacionLCL}
                      onChange={v=>upP('costoVerificacionLCL',v)} pre="USD"/>
                  </div>
                )}

                <SectionLabel>Otros LCL</SectionLabel>
                <Field label="Honorarios despachante (+IVA 21%)" value={p.honorariosLCL} onChange={v=>upP('honorariosLCL',v)} pre="USD"/>
                <Field label="Transporte nacional (+IVA 21%)" value={p.transporteNacLCL} onChange={v=>upP('transporteNacLCL',v)} pre="USD"/>
              </div>

              <div className="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
                <h2 className="font-semibold text-slate-800 mb-3">🛒 Mercado Libre</h2>
                <SectionLabel>Comisión Categoría</SectionLabel>
                <div className="grid grid-cols-2 gap-2">
                  <Field small label="Comisión Categoría %" value={p.mlComisionPct} onChange={v=>upP('mlComisionPct',v)} suf="%"/>
                  <Field small label="Publicidad %" value={p.mlPublicidadPct} onChange={v=>upP('mlPublicidadPct',v)} suf="%"/>
                  <Field small label="IIBB %" value={p.mlIIBBpct} onChange={v=>upP('mlIIBBpct',v)} suf="%"/>
                  <Field small label="Varios %" value={p.mlVariosPct} onChange={v=>upP('mlVariosPct',v)} suf="%"/>
                </div>
                <div className="bg-indigo-50 rounded-lg px-3 py-2 mt-1 text-xs text-indigo-700">
                  Total CF ML: <strong>{fmt2(mlCFpct)}%</strong>
                </div>

                <SectionLabel>Impuestos adicionales</SectionLabel>
                <Field small label="Imp. Déb y Créd %" value={p.mlImpDebCredPct} onChange={v=>upP('mlImpDebCredPct',v)} suf="% sobre PVP C/IVA"/>

                <SectionLabel>Cuotas sin interés — costos reales</SectionLabel>
                <div className="space-y-1.5">
                  {[3,6,9,12].map(c => (
                    <div key={c} className="flex items-center gap-2">
                      <span className="text-xs text-slate-500 w-16 shrink-0">{c} cuotas</span>
                      <div className="flex-1 flex rounded-lg overflow-hidden border border-slate-200 bg-white focus-within:border-indigo-400 transition-all">
                        <input type="number" step="0.01"
                          value={p[`cuotas${c}CostoReal`] ?? ''}
                          onChange={e=>upP(`cuotas${c}CostoReal`,e.target.value)}
                          className="flex-1 px-3 py-1.5 bg-white outline-none text-slate-800 text-xs"/>
                        <span className="px-2 py-1.5 bg-slate-50 text-slate-400 text-xs border-l border-slate-200">%</span>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="mt-3">
                  <Field label="Traslado adicional al comprador" value={p.cuotasTrasladoAdicional}
                    onChange={v=>upP('cuotasTrasladoAdicional',v)} suf="% (todas las cuotas)"/>
                </div>
              </div>

              <button
                onClick={() => { if(window.confirm('¿Restaurar todos los parámetros por defecto?')) setP(DEFAULT_PARAMS); }}
                className="w-full py-2.5 text-sm text-red-500 border border-red-200 rounded-lg hover:bg-red-50 transition-colors font-medium">
                🔄 Restaurar parámetros por defecto
              </button>
            </div>

          </div>
        </div>
      )}

      {/* SAVE MODAL */}
      {showSave && r && (
        <SaveModal
          onSave={nombre => {
            saveCotiz(nombre, {
              precioUnit, cantidad, tipoPrecio, tipoEmbarque, cbm, pesoCargaTotal,
              precioVenta, pesoReal,
              cifUSD: r.cifUSD,
              gastosAdicionalesUSD: r.gastosAdicionalesUSD,
              totalAranceles: r.totalAranceles,
              totalCredFisc: r.totalCredFisc,
              costoTotalARS: r.costoTotalARS,
              costoUnitUSD: r.costoUnitUSD,
              costoSinFisc: r.costoSinFisc,
              costoSinFiscUSD: r.costoSinFiscUSD,
            });
            setShowSave(false);
          }}
          onClose={() => setShowSave(false)}
        />
      )}

    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
